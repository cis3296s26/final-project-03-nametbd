<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- CSS (go up one level) -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" href="/assets/resources/logo/best(1).svg" type="image/svg+xml">
</head>

<body>

<!--  NAVBAR (same on every page) -->
<header class="navbar">
    <div class="navbar-left">
        <a href="/">
            <img src="/assets/resources/logo/best(1).svg" alt="Logo" class="logo">
        </a>
        <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
        <a href="/assets/pages/dashboard.html">My Dashboard</a>
        <a href="/assets/pages/jobs.html">Browse Jobs</a>

        <div class="dropdown">
            <button class="dropbtn">Career Prep ▾</button>
            <div class="dropdown-content">
                <a href="applications.html">Application Status</a>
                <a href="dashboard.html">Interview Prep</a>
                <a href="/assets/pages/calendar.html">Calendar</a>
            </div>
        </div>

        <a href="/assets/pages/messages.html">Messaging</a>
        <a href="/assets/pages/notifications.html">Notifications</a>

        <div class="dropdown">
            <button class="dropbtn">Profile ▾</button>
            <div class="dropdown-content">
                <a href="/assets/pages/profile.html">Profile</a>
                <a href="/assets/pages/settings.html">Settings</a>
                <a href="#" data-action="logout">Sign Out</a>
            </div>
        </div>
    </nav>
</header>

<!-- PAGE CONTENT -->
<main class="dashboard">
    <div class="page-header">
        <h1>My Dashboard</h1>
    </div>


    <!-- Left Sidebar-->
    <aside class="left-sidebar">
        <section class="card profile-card">
            <div class="banner"></div>
            <div class="avatar" id="dashboardProfileAvatar" aria-label="Profile avatar"></div>
            <h2 id="dashboardProfileName">Loading...</h2>
            <p id="dashboardProfileTagline">Loading your profile...</p>
            <hr>
            <div class="sidebar-stat">
                <span>Applications submitted</span>
                <strong id="dashboardApplicationsCount">0</strong>
            </div>
            <div class="sidebar-stat">
                <span>Interviews scheduled</span>
                <strong id="dashboardInterviewsCount">0</strong>
            </div>
        </section>
    </aside>


    <!-- Main Feed-->
    <section class="feed">
        <section class="card post">
            <h3>Recommended Jobs (<span id="dashboardJobsCount">0</span>)</h3>
            <p id="dashboardJobsStatus" aria-live="polite"></p>
            <div id="dashboardJobsList" class="job-card-list"></div>
            <div class="job-pagination">
                <button id="dashboardPrevBtn" class="secondary-btn" type="button">Previous 10</button>
                <span id="dashboardPageLabel" class="job-pagination-label">Page 1</span>
                <button id="dashboardNextBtn" class="secondary-btn" type="button">Next 10</button>
            </div>
        </section>

        <section class="card post">
            <h3>Saved Jobs</h3>
            <p id="savedJobsStatus" aria-live="polite"></p>
            <div id="savedJobsList" class="job-card-list"></div>
        </section>

    </section>



</main>


<!-- JS -->
<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/auth-api.js"></script>
<script src="/assets/js/profile-api.js"></script>
<script src="/assets/js/jobs-api.js"></script>
<script src="/assets/js/jobs-saved.js"></script>
<script src="/assets/js/dashboard-jobs.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
