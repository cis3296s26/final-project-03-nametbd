<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
<div class="container">
    <div class="form-container">

        <div class="fluid-container">
            <img src="/assets/resources/Untitled.svg" id="fluid" class="fluid-image">
        </div>

        <div class="login-container">
            <div class="form-header">
                <p>Please enter your details</p>
                <h1 id="formTitle">Welcome Back</h1>
            </div>

            <form id="loginForm" class="form-box">
                <div class="input-group">
                    <input type="email" id="email" class="input-field" autocomplete="off" placeholder="" required>
                    <label for="email" class="floating-label">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" autocomplete="off" placeholder="" required>
                    <label for="password" class="floating-label">Password</label>

                    <div class="eye-icon" onclick="togglePassword(this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>

                <div class="input-group checkbox-group">
                    <div class="form col remember-me">
                        <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                        <label for="remember-me-checkbox">Remember me</label>
                    </div>

                    <div class="form-col">
                        <a href="#" class="form-link">Forgot Password?</a>
                    </div>
                </div>

                <p id="authStatus" aria-live="polite"></p>
                <button type="submit" class="form-btn form-btn--submit">Sign In</button>
            </form>

            <div class="form-divider">
                <p>Or</p>
            </div>

            <div class="form-bottom">
                <div class="form-socials">
                    <button type="button" class="form-btn form-btn--social">
                        <img src="/assets/resources/google.svg" class="btn-icon" alt="social icon">
                    </button>
                </div>
                <p>Don't have an account? <a href="#" class="form-link" id="register-btn">Sign Up</a></p>
            </div>
        </div>
        <!-- END LOGIN CONTAINER-->

        <!-- REGISTER FORM - CONTAINER -->
        <div class="register-container">

            <!-- LOGIN - Form Header-->
            <div class="form-header">
                <p>Welcome to TalentStack</p>
                <h1 id="formTitle">Create Account</h1>
            </div>

            <form id="registerForm" class="form-box">
                <div class="input-group">
                    <input type="text" id="firstName" name="firstName" class="input-field" placeholder="First Name" required>
                </div>

                <div class="input-group">
                    <input type="text" id="lastName" name="lastName" class="input-field" placeholder="Last Name" required>
                </div>

                <div class="input-group">
                    <input type="email" id="regEmail" name="email" class="input-field" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="password" id="regPassword" name="password" class="input-field" placeholder="Password" required>
                    <div class="eye-icon" onclick="togglePassword(this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="input-field" placeholder="Confirm Password" required>
                    <div class="eye-icon" onclick="togglePassword(this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>

                <p id="registerStatus" aria-live="polite"></p>
                <button type="submit" id="submitBtn" class="form-btn form-btn--submit">Create Account</button>
            </form>

            <div class="form-divider">
                <p>Or</p>
            </div>

            <div class="form-bottom">
                <div class="form-socials">
                    <button type="button" class="form-btn form-btn--social">
                        <img src="/assets/resources/google.svg" class="btn-icon" alt="social icon">
                    </button>
                </div>
                <p>Already have an account? <a href="#" class="form-link" id="login-btn">Sign In</a></p>
            </div>
        </div>

    </div>
</div>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/auth-api.js"></script>
<script src="/assets/js/auth-page.js"></script>
<script src="/assets/js/index.js"></script>
</body>
</html>
