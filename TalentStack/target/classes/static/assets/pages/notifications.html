<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications - TalentStack</title>

    <!-- CSS (go up one level) -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/notifications.css">
</head>

<body>

<!--  NAVBAR (same on every page) -->
<header class="navbar">
    <div class="navbar-left">
        <a href="/">
        <div class="logo">TS</div>
    </a>
        <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
        <a href="/assets/pages/dashboard.html">My Dashboard</a>
        <a href="/assets/pages/jobs.html">Browse Jobs</a>

        <div class="dropdown">
            <button class="dropbtn">Career Prep ▾</button>
            <div class="dropdown-content">
                <a href="/assets/pages/dashboard.html">Application Status</a>
                <a href="/assets/pages/dashboard.html">Interview Prep</a>
                <a href="/assets/pages/dashboard.html">Calendar</a>
            </div>
        </div>

        <a href="/assets/pages/messages.html">Messaging</a>
        <a href="/assets/pages/notifications.html">Notifications</a>

        <div class="dropdown">
            <button class="dropbtn">Profile ▾</button>
            <div class="dropdown-content">
                <a href="/assets/pages/profile.html">Profile</a>
                <a href="/assets/pages/settings.html">Settings</a>
                <a href="#">Sign Out</a>
            </div>
        </div>
    </nav>
</header>

<!-- PAGE CONTENT -->
<main class="dashboard">
    <div class="page-header">
        <h1>Notifications</h1>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('unread', this)">Unread</button>
        <button class="filter-btn" onclick="setFilter('connections', this)">Connections</button>
        <button class="filter-btn" onclick="setFilter('jobs', this)">Jobs</button>
        <button class="filter-btn" onclick="setFilter('mentions', this)">Mentions</button>
    </div>
    <div id="feed"></div>
</main>

<div id="toast">
    Notification removed
    <button onclick="undoDismiss()">Undo</button>
</div>
<!-- JS -->
<script src="/assets/js/notifications-page.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
