<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications - TalentStack</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/notifications.css">
    <link rel="icon" href="/assets/resources/logo/best(1).svg" type="image/svg+xml">
</head>

<body>
<header class="navbar">
    <div class="navbar-left">
        <a href="/">
            <img src="/assets/resources/logo/best(1).svg" alt="TalentStack logo" class="logo">
        </a>
        <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
        <a href="/assets/pages/dashboard.html">My Dashboard</a>
        <a href="/assets/pages/jobs.html">Browse Jobs</a>

        <div class="dropdown">
            <button class="dropbtn" type="button">Career Prep</button>
            <div class="dropdown-content">
                <a href="/assets/pages/dashboard.html">Application Status</a>
                <a href="/assets/pages/dashboard.html">Interview Prep</a>
                <a href="/assets/pages/calendar.html">Calendar</a>
            </div>
        </div>

        <a href="/assets/pages/messages.html">Messaging</a>
        <a href="/assets/pages/notifications.html">Notifications</a>

        <div class="dropdown">
            <button class="dropbtn" type="button">Profile</button>
            <div class="dropdown-content">
                <a href="/assets/pages/profile.html">Profile</a>
                <a href="/assets/pages/settings.html">Settings</a>
                <a href="#" data-action="logout">Sign Out</a>
            </div>
        </div>
    </nav>
</header>

<main class="dashboard">
    <div class="page-header">
        <h1>Notifications</h1>
        <button class="mark-all-btn" id="markAllReadBtn" type="button">Mark all as read</button>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" type="button" data-filter="all">All</button>
        <button class="filter-btn" type="button" data-filter="unread">Unread</button>
        <button class="filter-btn" type="button" data-filter="connections">Connections</button>
        <button class="filter-btn" type="button" data-filter="jobs">Jobs</button>
        <button class="filter-btn" type="button" data-filter="mentions">Mentions</button>
    </div>
    <div id="feed"></div>
</main>

<div id="toast">
    Notification removed
    <button id="undoDismissBtn" type="button">Undo</button>
</div>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/auth-api.js"></script>
<script src="/assets/js/notifications-page.js"></script>
<script src="/assets/js/nav.js"></script>
</body>
</html>
