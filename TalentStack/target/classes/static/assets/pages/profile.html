<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <!-- CSS (go up one level) -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!--  NAVBAR (same on every page) -->
  <header class="navbar">
    <div class="navbar-left">
      <a href="../TalentStack/src/main/resources/static/index.html">
        <div class="logo">TS</div>
      </a>
      <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
      <a href="dashboard.html">My Dashboard</a>
      <a href="jobs.html">Browse Jobs</a>

      <div class="dropdown">
        <button class="dropbtn">Career Prep ▾</button>
        <div class="dropdown-content">
          <a href="dashboard.html">Application Status</a>
          <a href="dashboard.html">Interview Prep</a>
          <a href="dashboard.html">Calendar</a>
        </div>
      </div>

      <a href="messages.html">Messaging</a>
      <a href="notifications.html">Notifications</a>

      <div class="dropdown">
        <button class="dropbtn">Profile ▾</button>
        <div class="dropdown-content">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="#">Sign Out</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  <main class="dashboard">
    <div class="page-header">
      <h1>Profile</h1>
    </div>
    <section class="auth-card">
      <p id="profileStatus"></p>

      <form id="profileForm">
        <label for="profileEmail">Email</label>
        <input type="email" id="profileEmail" required>

        <label for="profileFirstName">First Name</label>
        <input type="text" id="profileFirstName">

        <label for="profileLastName">Last Name</label>
        <input type="text" id="profileLastName">

        <p><strong>Created At:</strong> <span id="profileCreatedAt">Unavailable</span></p>

        <button type="submit">Save Profile</button>
      </form>
    </section>
  </main>

  <!-- JS -->
  <script src="../js/auth-session.js"></script>
  <script src="../js/profile-api.js"></script>
  <script src="../js/index.js"></script>
</body>
</html>
