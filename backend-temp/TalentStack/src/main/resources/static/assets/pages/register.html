<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>

<body>
<main class="auth-page">
    <section class="auth-card">
        <h1 id="formTitle">Register</h1>

        <form id="registerForm">
            <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
            <input type="email" id="email" name="email" placeholder="Email" required>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <button
                        type="button"
                        class="eye-icon password-toggle"
                        data-target="password"
                        aria-label="Toggle password visibility">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                <button
                        type="button"
                        class="eye-icon password-toggle"
                        data-target="confirmPassword"
                        aria-label="Toggle confirm password visibility">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye">
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <p id="authStatus" aria-live="polite"></p>

            <button type="submit" id="submitBtn">Create Account</button>
        </form>

        <p id="toggleText">
            Have an account already?
            <span id="toggleMode"><a href="/assets/pages/login.html">Sign In</a></span>
        </p>
    </section>
</main>

<script src="/assets/js/auth-session.js"></script>
<script src="/assets/js/auth-api.js"></script>
<script src="/assets/js/auth-page.js"></script>
</body>
</html>
