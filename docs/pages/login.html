<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sign In - TalentStack</title>

        <!-- CSS (go up one level) -->
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="icon" href="../resources/logo/best(1).svg" type="image/svg+xml">
    </head>

    <body>
        <div class="container">
            <div class="form-container">

                <!-- Form Fluid Element -->
                <div class="fluid-container">
                    <img src="../resources/Untitled.svg" id="fluid" class="fluid-image">
                </div>
                
                <!-- START LOGIN CONTAINER-->
                <div class="login-container">

                    <!-- LOGIN - Form Header-->
                    <div class="form-header">
                        <p>Please enter your details</p>
                        <h1 id="formTitle">Welcome Back</h1>
                    </div>

                    <!-- Form Box / Main Inputs-->
                    <form class="form-box" id="loginForm">
                        <div class="input-group">
                            <input type="email" id="email" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="email" class="floating-label">Email Address</label>
                        </div>

                        <div class="input-group">
                            <input type="password" id="password" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="password" class="floating-label">Password</label>

                            <div class="eye-icon" onclick="togglePassword(this)">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </div>
                        </div>

                        <div class="input-group checkbox-group">
                            <div class="form col remember-me">
                                <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                                <label for="remember-me-checkbox">Remember me</label>
                            </div>
                        
                            <div class="form-col">
                                <a href="#" class="form-link">Forgot Password?</a>
                            </div>
                        </div>

                        <button type="submit" class="form-btn form-btn--submit">Sign In</button>     
                    </form>

                    <!-- Form Divider -->
                    <div class="form-divider">
                        <p>Or</p>
                    </div>

                    <!-- After divider, contains other sign in method and register account-->
                    <div class="form-bottom">
                        <div class="form-socials">
                            <button class="form-btn form-btn--social">
                                <img src="../resources/google.svg" class="btn-icon" alt="social icon">
                            </button>
                        </div>
                        <p>Don't have an account? <a href="#" class="form-link" id="register-btn">Sign Up</a></p>
                    </div>

                </div>
                <!-- END LOGIN CONTAINER-->

                <!-- REGISTER FORM - CONTAINER -->
                <div class="register-container">

                    <!-- LOGIN - Form Header-->
                    <div class="form-header">
                        <p>Welcome to TalentStack</p>
                        <h1 id="formTitle">Create Account</h1>
                    </div>

                    <!-- Form Box / Main Inputs-->
                    <form class="form-box" id="registerForm">
                        <div class="input-group">
                            <input type="text" id="full-name" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="full-name" class="floating-label">Full Name</label>
                        </div>

                        <div class="input-group">
                            <input type="text" id="username" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="username" class="floating-label">Username</label>
                        </div>

                        <div class="input-group">
                            <input type="email" id="reg-email" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="reg-email" class="floating-label">Email Address</label>
                        </div>
                        
                        <div class="input-group">
                            <input type="password" id="reg-password" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="reg-password" class="floating-label">Password</label>

                            <div class="eye-icon" onclick="togglePassword(this)">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </div>
                        </div>

                        <div class="input-group">
                            <input type="password" id="confirm-password" class="input-field" autocomplete="off" placeholder="" required>
                            <label for="confirm-password" class="floating-label">Confirm Password</label>

                            <div class="eye-icon" onclick="togglePassword(this)">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </div>
                        </div>

                        <div class="input-group checkbox-group">
                            <div class="form col remember-me">
                                <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                                <label for="remember-me-checkbox">Remember me</label>
                            </div>
                        </div>

                        <button type="submit" href="preferences.html" class="form-btn form-btn--submit">Sign Up</button>     
                    </form>

                    <!-- Form Divider -->
                    <div class="form-divider">
                        <p>Or</p>
                    </div>

                    <!-- After divider, contains other sign in method and register account-->
                    <div class="form-bottom">
                        <div class="form-socials">
                            <button class="form-btn form-btn--social">
                                <img src="../resources/google.svg" class="btn-icon" alt="social icon">
                            </button>
                        </div>
                        <p>Already have an account? <a href="#" class="form-link" id="login-btn">Sign In</a></p>
                    </div>

                </div>

            </div>
            <!-- END ALL FORMMMMMS CONTAINER -->
        </div>




        <script src="../js/index.js"></script>
        <script type="module" src="../js/login.js"></script>
    </body>
</html>
