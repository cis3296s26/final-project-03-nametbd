<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Notifications – TalentStack</title>
 
 
    <!-- CSS (go up one level) -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/notifications.css">
    <link rel="icon" href="../resources/logo/best(1).svg" type="image/svg+xml">
  </head>
 
  <body>
 
    <!--  NAVBAR (same on every page) -->
    <header class="navbar">
      <div class="navbar-left">
        <a href="../index.html">
          <img src="../resources/logo/best(1).svg" alt="Logo" class="logo">
        </a>
        <input type="text" placeholder="Search" class="search-bar">
      </div>
 
      <nav class="navbar-nav">
        <a href="dashboard.html">My Dashboard</a>
        <a href="jobs.html">Browse Jobs</a>
 
        <div class="dropdown">
          <button class="dropbtn">Career Prep ▾</button>
          <div class="dropdown-content">
            <a href="dashboard.html">Application Status</a>
            <a href="dashboard.html">Interview Prep</a>
            <a href="dashboard.html">Calendar</a>
          </div>
        </div>
 
        <a href="messages.html">Messaging</a>
        <a href="notifications.html">Notifications</a>
 
        <div class="dropdown">
          <button class="dropbtn">Profile ▾</button>
          <div class="dropdown-content">
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="#">Sign Out</a>
          </div>
        </div>
      </nav>
    </header>
 
    <!-- PAGE CONTENT -->
    <main class="dashboard">
      <div class="page-header">
        <h1>Notifications</h1>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
      </div>
 
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('unread',this)">Unread</button>
        <button class="filter-btn" onclick="setFilter('connections',this)">Connections</button>
        <button class="filter-btn" onclick="setFilter('jobs',this)">Jobs</button>
        <button class="filter-btn" onclick="setFilter('mentions',this)">Mentions</button>
      </div>
 
      <div id="feed"></div>
 
    </main>
    <div id="toast">
      Notification removed
      <button onclick="undoDismiss()">Undo</button>
    </div>
 
    <!-- JS -->
    <script src="../js/index.js"></script>
 
    <script>
      let notifications = [];
  
      let currentFilter = 'all';
      let lastRemoved   = null;
      let toastTimer    = null;
  
      function render() {
        const feed = document.getElementById('feed');
        let items = currentFilter === 'all'    ? notifications
                : currentFilter === 'unread' ? notifications.filter(n => n.unread)
                : notifications.filter(n => n.category === currentFilter);
  
        if (!items.length) {
          feed.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications here yet.</p></div>`;
          return;
        }
  
        let html = '';
        ['today','earlier'].forEach(sec => {
          const group = items.filter(n => n.section === sec);
          if (!group.length) return;
          html += `<p class="section-label">${sec === 'today' ? 'Today' : 'Earlier'}</p><div class="notif-list">`;
          group.forEach(n => { html += cardHTML(n); });
          html += `</div>`;
        });
        feed.innerHTML = html;
      }
  
      function cardHTML(n) {
        const avatar = n.initials
          ? `<div class="notif-avatar" style="background:${n.color}">${n.initials}</div>`
          : `<div class="notif-icon" style="background:${n.iconBg}">${n.icon}</div>`;
        const actions = (n.actions || []).map(a =>
          a === 'accept'
            ? `<button class="btn-accept"  onclick="handleAction(event,${n.id},'accept')">Accept</button>`
            : `<button class="btn-decline" onclick="handleAction(event,${n.id},'decline')">Decline</button>`
        ).join('');
        return `<div class="notif-card ${n.unread?'unread':''}" id="notif-${n.id}" onclick="markRead(${n.id})">
          <div class="unread-dot"></div>
          ${avatar}
          <div class="notif-body">
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${n.time}</div>
            ${actions ? `<div class="notif-actions">${actions}</div>` : ''}
          </div>
          <button class="notif-dismiss" title="Dismiss" onclick="dismiss(event,${n.id})">×</button>
        </div>`;
      }
  
      function setFilter(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      }
  
      function markRead(id) {
        const n = notifications.find(x => x.id === id);
        if (n) n.unread = false;
        const card = document.getElementById(`notif-${id}`);
        if (card) card.classList.remove('unread');
      }
  
      function markAllRead() {
        notifications.forEach(n => n.unread = false);
        document.querySelectorAll('.notif-card.unread').forEach(c => c.classList.remove('unread'));
      }
  
      function dismiss(e, id) {
        e.stopPropagation();
        const idx = notifications.findIndex(n => n.id === id);
        if (idx === -1) return;
        lastRemoved = { notif: notifications[idx], idx };
        notifications.splice(idx, 1);
        const card = document.getElementById(`notif-${id}`);
        card.classList.add('removing');
        card.addEventListener('animationend', () => { render(); showToast(); }, { once: true });
      }
  
      function handleAction(e, id, type) {
        e.stopPropagation();
        const n = notifications.find(x => x.id === id);
        if (!n) return;
        n.actions = []; n.unread = false;
        n.text += type === 'accept'
          ? ' <span style="color:#3a7d44;font-weight:600">✓ Accepted</span>'
          : ' <span style="color:#aaa;font-weight:600">Declined</span>';
        render();
      }
  
      function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
      }
  
      function undoDismiss() {
        if (!lastRemoved) return;
        notifications.splice(lastRemoved.idx, 0, lastRemoved.notif);
        lastRemoved = null;
        document.getElementById('toast').classList.remove('show');
        render();
      }
  
      render();
    </script>
  </body>
</html>
