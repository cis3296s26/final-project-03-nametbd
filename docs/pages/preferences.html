<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sign In - TalentStack</title>

        <!-- CSS (go up one level) -->
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="icon" href="../resources/logo/best(1).svg" type="image/svg+xml">
    </head>

    <body>
        <div class="container">
            <form id="preferencesForm" class="form-container">
                <div class="preferences-container">

                    <div class="form-header">
                        <p>Set Up Account</p>
                        <h1 id="formTitle">Choose Preferences</h1>
                    </div>

                    <div class="form-box">

                        <div class="input-group">
                            <input type="number" id="age" class="input-field" min="13" max="120" autocomplete="off" placeholder="" autocomplete="off">
                            <label for="age" class="floating-label">Age</label>
                        </div>
                        
                        <div class="input-group">
                            <select id="education" class="input-field">
                                <option value="" disable selected hidden>Select...</option>
                                <option value="high-school">High School</option>
                                <option value="associate">Associate Degree</option>
                                <option value="bachelor">Bachelor's Degree</option>
                                <option value="master">Master's Degree</option>
                                <option value="other">Other</option>
                            </select>
                            <label for="education" class="floating-label">Education Completed</label>
                        </div>

                        <div class="input-group">
                            <select id="jobInterest" class="input-field" >
                                <option value="" disable selected hidden>Select...</option>
                                <option value="full-time">Full-Time</option>
                                <option value="part-time">Part-Time</option>
                                <option value="internship">Internship</option>
                                <option value="freelance">Research</option>
                            </select>
                            <label for="jobInterest" class="floating-label">Jobs Looking For</label>
                        </div>


                        <button type="submit" id="savePreferencesBtn" class="form-btn form-btn--submit"">Save and Continue</button>
                        <button type="button" id="skipPreferencesBtn" class="form-link secondary-btn">Skip for Now</button>
                        <p class="form-subtext">These preferences are optional and can be updated later.</p>
                    </div>

                </div>
            </form>
        </div>
        


        <script src="../js/index.js"></script>
    </body>
</html>
