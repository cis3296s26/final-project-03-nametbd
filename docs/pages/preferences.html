<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Set up Account - TalentStack</title>

        <!-- CSS (go up one level) -->
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="icon" href="../resources/logo/best(1).svg" type="image/svg+xml">
    </head>

    <body>
        <div class="container">
            <form id="preferencesForm" class="form-container">
                <div class="preferences-container">

                    <div class="form-header">
                        <p>Set Up Account</p>
                        <h1 id="formTitle">Choose Preferences</h1>
                    </div>

                    <div class="form-box">

                        <div class="input-group">
                            <input type="number" id="age" class="input-field" min="13" max="120" autocomplete="off" placeholder=" ">
                            <label for="age" class="floating-label">Age</label>
                        </div>
                        
                        <div class="input-group">
                            <select id="education" class="input-field">
                                <option value="" disabled selected hidden></option>
                                <option value="high-school">High School</option>
                                <option value="associate">Associate Degree</option>
                                <option value="bachelor">Bachelor's Degree</option>
                                <option value="master">Master's Degree</option>
                                <option value="other">Other</option>
                            </select>

                            <span class="select-arrow">
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                    <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>

                            <label for="education" class="floating-label">Education Completed</label>
                        </div>
                        
                        
                        <div class="check-group-section">
                            <label class="check-group-label">Jobs Looking For</label>
                            <div class="check-group-wrapper">
                                

                                <div class="check-group">
                                    <label class="check-option">
                                        <input type="checkbox" name="jobInterest" value="full-time">
                                        <span>Full-Time</span>
                                    </label>

                                    <label class="check-option">
                                        <input type="checkbox" name="jobInterest" value="part-time">
                                        <span>Part-Time</span>
                                    </label>

                                    <label class="check-option">
                                        <input type="checkbox" name="jobInterest" value="internship">
                                        <span>Internship</span>
                                    </label>

                                    <label class="check-option">
                                        <input type="checkbox" name="jobInterest" value="research">
                                        <span>Research</span>
                                    </label>

                                    <label class="check-option">
                                        <input type="checkbox" name="jobInterest" value="other">
                                        <span>Other</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        

                        <div class="form-actions">
                            <button type="submit" id="savePreferencesBtn" class="form-btn form-btn--submit">Save and Continue</button>
                            <button type="button" id="skipPreferencesBtn" class="form-link secondary-btn" onclick="window.location.href='dashboard.html';">Skip for Now</button>
                            <p class="form-subtext">These preferences are optional and can be updated later.</p>
                        </div>
                    </div>

                </div>
            </form>
        </div>
        


        <script src="../js/index.js"></script>
    </body>
</html>
