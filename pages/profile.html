<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <!-- CSS (go up one level) -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!--  NAVBAR (same on every page) -->
  <header class="navbar">
    <div class="navbar-left">
      <a href="../index.html">
        <img src="../resources/logo/best(1).svg" alt="Logo" class="logo">
      </a>
      <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
      <a href="dashboard.html">My Dashboard</a>
      <a href="jobs.html">Browse Jobs</a>

      <div class="dropdown">
        <button class="dropbtn">Career Prep ▾</button>
        <div class="dropdown-content">
          <a href="dashboard.html">Application Status</a>
          <a href="dashboard.html">Interview Prep</a>
          <a href="dashboard.html">Calendar</a>
        </div>
      </div>

      <a href="messages.html">Messaging</a>
      <a href="notifications.html">Notifications</a>

      <div class="dropdown">
        <button class="dropbtn">Profile ▾</button>
        <div class="dropdown-content">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="#">Sign Out</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  <main class="dashboard">
    <div class="page-header">
      <h1>Profile</h1>
    </div>

    <div class="profile-dsplay">
      <!-- DISPLAY Profile (TDB: edit if user is logged in to account linked to profile) -->
      <div style="text-align: center; margin-bottom: 30px;">
        <img id="profilePicture" src="../resources/defaultProfilePic.jpg" alt="Profile Picture"
             class="profile-img">
      </div>

      <!-- Basic Info Display -->
      <div id="profileInfoSection" class="profile-info" style="display: none;">
        <div class="profile-field">
          <label>Full Name: </label>
          <span id="displayName" class="profile-value">Not Set</span>
        </div>

        <div class="profile-field">
          <label>Status: </label>
          <span id="displayStatus" class="profile-value">Not Set</span>
        </div>

        <div class="profile-field">
          <label>Location: </label>
          <span id="displayLocation" class="profile-value">Not Set</span>
        </div>
      </div>

      <!-- Tags Display -->
      <div id="tagsSection" class="tags-section" style="display: none;">
        <h2>Skills & Sections</h2>
        <div id="tagsList" class="tags-list">
          <!-- TBD: display chosen tags -->
        </div>
      </div>

      <!-- Edit Profile -->
      <div style="text-align: center; margin-top: 30px;">
        <a href="settings.html" class="primary-btn bubbly-btn"
           style="display: inline-block; padding: 16px 32px; font-size: 1.1rem;">Edit Profile
        </a>
      </div>
    </div>
  </main>

  <!-- JS -->
  <script src="../js/index.js"></script>
</body>
</html>
