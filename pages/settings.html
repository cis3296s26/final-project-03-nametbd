<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <!-- CSS (go up one level) -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!--  NAVBAR (same on every page) -->
  <header class="navbar">
    <div class="navbar-left">
      <a href="../index.html">
        <img src="../resources/logo/best(1).svg" alt="Logo" class="logo">
      </a>
      <input type="text" placeholder="Search" class="search-bar">
    </div>

    <nav class="navbar-nav">
      <a href="dashboard.html">My Dashboard</a>
      <a href="jobs.html">Browse Jobs</a>

      <div class="dropdown">
        <button class="dropbtn">Career Prep ▾</button>
        <div class="dropdown-content">
          <a href="dashboard.html">Application Status</a>
          <a href="dashboard.html">Interview Prep</a>
          <a href="dashboard.html">Calendar</a>
        </div>
      </div>

      <a href="messages.html">Messaging</a>
      <a href="notifications.html">Notifications</a>

      <div class="dropdown">
        <button class="dropbtn">Profile ▾</button>
        <div class="dropdown-content">
          <a href="profile.html">Profile</a>
          <a href="settings.html">Settings</a>
          <a href="#">Sign Out</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  <main class="dashboard">
    <div class="page-header">
      <h1>Account Settings</h1>
    </div>

    <div class="profile-container">
      <h2>Profile Picture</h2>
      <!-- Profile Picture Upload/Display -->
      <div class="profile-picture-section">
        <img id="profilePicture" src="../resources/defaultProfilePic.jpg" alt="Profile Picture"
             class="profile-img">
        <input type="file" id="picUpload" accept="image/*" style="display: none;">
        <div style="margin: 20px 0;">
          <button class="primary-btn bubbly-btn"
                  onclick="document.getElementById('picUpload').click()">Change Picture</button>
          <button class="primary-btn bubbly-btn secondary"
                  onclick="resetPic()">Reset to Default</button>
        </div>
      </div>
    </div>

    <!-- Basic Information Form -->
    <div class="basic-info">
      <h2>Basic Information</h2>
      <label for="fullName">Full Name: </label>
      <input type ="text" id="fullName" placeholder="Enter your full name" value="John Smith">

      <label for="status">Status: </label>
      <select id="status">
        <option value="student">Student</option>
        <option value="graduate">Graduate</option>
      </select>

      <label for="location">Location: </label>
      <input type="text" id="location" placeholder="City, State" value="Pittsburg, Pennsylvania">

      <button class="primary-btn bubbly-btn" onclick="saveBasicInfo()">Save Information</button>
    </div>

    <!-- Tags/Sections -->
    <div class="tags-section">
      <h2>Skills & Sections</h2>
      <button class="primary-btn bubbly-btn" onclick="addTag()">Add Tag</button>
      <!-- TBD-->
    </div>
  </main>

  <!-- JS -->
  <script src="../js/index.js"></script>
</body>
</html>
